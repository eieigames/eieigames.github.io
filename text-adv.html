<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Old Time Text Adventure | Eiei Games</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="container game-page">
        <a class="back-link" href="index.html">Back to eieigames</a>
        <section class="game-card game-page-card" aria-label="Old Time Text Adventure">
            <img
                class="game-card-image"
                src="assets/text-game.png"
                alt="Old Time Text Adventure preview"
            >
            <div class="game-card-badge">Live Now</div>
            <h1 class="game-card-title game-page-title">Old Time Text Adventure</h1>

            </p>

                Built for players who like atmosphere, decision-making, and a little doom in their fantasy.
            </p>

                class="launch-button"
                href="https://old-time-text-adventure.fly.dev"
