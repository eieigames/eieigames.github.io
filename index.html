<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eiei Games</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="container">
        <h1 class="logo">
            eiei<span class="logo-accent">games</span>
        </h1>
        <p class="tagline">Europe</p>
        <div class="divider" aria-hidden="true"></div>

        <section class="games-grid" aria-label="Games">
            <a
                class="game-card game-card-link"
                href="https://old-time-text-adventure.fly.dev"
                target="_blank"
                rel="noreferrer"
            >
                <img
                    class="game-card-image"
                    src="assets/text-game.png"
                    alt="Old Time Text Adventure preview"
                >
                <div class="game-card-badge">Live Now</div>
                <h2 class="game-card-title">Old Time Text Adventure</h2>
                <p class="game-card-text">
                    Old time text adventure at fly.io with natural language parser
                </p>
                <span class="game-card-cta">Play at old-time-text-adventure.fly.dev</span>
            </a>

            <article class="game-card game-card-placeholder">
                <div class="game-card-badge">Coming Soon</div>
                <h2 class="game-card-title">Sepsis 2.0</h2>
                <p class="game-card-text">
                    Swirling in code jungle is the react native mobile game to play as bacteria; kill the patient.
                </p>
                <span class="game-card-cta">Soon...</span>
            </article>
        </section>
    </main>
</body>
</html>
