<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eiei Games</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #000010;
            color: #00ff08;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Ambient glowing background blobs */
        body::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(102,252,102,0.1) 0%, rgba(0,0,0,0) 70%);
            top: 20%;
            left: 25%;
            z-index: 1;
            animation: float 8s ease-in-out infinite alternate;
        }

        body::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(78,205,78,0.08) 0%, rgba(0,0,0,0) 70%);
            bottom: 15%;
            right: 20%;
            z-index: 1;
            animation: float 12s ease-in-out infinite alternate-reverse;
        }

        .container {
            text-align: center;
            padding: 2rem;
            z-index: 2;
            max-width: 600px;
        }

        .logo {
            font-size: 3.5rem;
            font-weight: 900;
            letter-spacing: -1px;
            color: #00ff3c;
            margin-bottom: 0.5rem;
            text-transform: lowercase;
            animation: pulse 3s ease-in-out infinite;
        }

        .logo span {
            color: #4c00ff; /* High-tech teal accent */
        }

        .tagline {
            font-size: 1.25rem;
            font-weight: 400;
            color: #00ff7b;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 2rem;
        }

        .divider {
            height: 2px;
            width: 50px;
            background-color: #4c00ff;
            margin: 0 auto 2rem auto;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #4c00ff;
        }

        @keyframes float {
            0% { transform: translateY(0px) scale(1); }
            100% { transform: translateY(20px) scale(1.1); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.95; }
            50% { opacity: 1; text-shadow: 0 0 10px rgba(102,252,241,0.2); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">eiei<span>games</span></div>
        <div class="tagline">Europe</div>
        <div class="divider"></div>
        <p>Stand by for interesting games...</p>
    </div>

</body>
</html>
